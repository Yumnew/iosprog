# =============================================================================
#  Yumurta iOS  ·  codemagic.yaml
#  Проект: YumurtaPremium (SwiftUI, XcodeGen, bundle id ru.marketplace.client.premium)
#  Репозиторий: github.com/Yumnew/iosprog  (ветка main)
# =============================================================================
#
#  ЧТО НУЖНО ОДИН РАЗ НАСТРОИТЬ В UI, чтобы РЕЛИЗНЫЙ воркфлоу заработал:
#
#  1) App Store Connect API-ключ в Codemagic:
#       Teams → Integrations → Developer Portal → добавить App Store Connect API key
#       (Issuer ID + Key ID + .p8). Роль ключа: App Manager или Admin.
#       Имя интеграции ВПИШИ в integrations.app_store_connect (сейчас плейсхолдер).
#
#  2) App ID в Apple Developer (portal → Identifiers):
#       ru.marketplace.client.premium  с включёнными capability:
#         • Push Notifications           (в проекте aps-environment = production)
#         • Associated Domains           (applinks:yumurta.ru)
#
#  3) Запись приложения в App Store Connect (bundle id ru.marketplace.client.premium),
#       затем впиши числовой Apple ID приложения в var APP_STORE_APPLE_ID
#       (0 = взять встроенный BUILD_NUMBER — годится для первой сборки).
#
#  Team ID (Rovshan Mammadov): Y9Q3SKDB35 — подтягивается из API-ключа автоматически.
#
#  ВАЖНО про UNSIGNED-воркфлоу: он отдаёт НЕподписанный .ipa в артефактах.
#  На обычный айфон напрямую он не встанет — ставь через Sideloadly / AltStore
#  (они подпишут его твоим Apple ID). Для нормальной установки без плясок —
#  релизный воркфлоу и TestFlight.
# =============================================================================

workflows:

  # ---------------------------------------------------------------------------
  # 1. UNSIGNED — собирает НЕподписанный .ipa и кладёт в артефакты (скачать/сайдлоад).
  #    Секретов не требует. Гоняется на каждый push и pull request.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS · Unsigned IPA (sideload / compile check)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "YumurtaPremium.xcodeproj"
        XCODE_SCHEME: "YumurtaPremium"
        APP_NAME: "YumurtaPremium"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Generate Xcode project (XcodeGen)
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen generate
          xcodebuild -project "$XCODE_PROJECT" -list
      - name: Archive without signing
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/$APP_NAME.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | xcbeautify
      - name: Package unsigned .ipa
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          APP_PATH="$CM_BUILD_DIR/build/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          OUT="$CM_BUILD_DIR/build/ipa"
          rm -rf "$OUT" && mkdir -p "$OUT/Payload"
          cp -R "$APP_PATH" "$OUT/Payload/"
          ( cd "$OUT" && zip -qry "$APP_NAME-unsigned.ipa" Payload && rm -rf Payload )
          echo "Built: $OUT/$APP_NAME-unsigned.ipa"
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ---------------------------------------------------------------------------
  # 2. APP STORE RELEASE — подписанный архив → .ipa → выгрузка в TestFlight.
  #    Автоподпись через App Store Connect API-ключ. Триггер — git-тег vX.Y.Z.
  #    (Вручную из UI можно запустить в любой момент, триггер не обязателен.)
  # ---------------------------------------------------------------------------
  ios-appstore-release:
    name: iOS · App Store release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: YumurtaAppStoreConnect   # <-- имя твоей интеграции App Store Connect в Codemagic
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ru.marketplace.client.premium
      vars:
        XCODE_PROJECT: "YumurtaPremium.xcodeproj"
        XCODE_SCHEME: "YumurtaPremium"
        BUNDLE_ID: "ru.marketplace.client.premium"
        APP_STORE_APPLE_ID: 0    # <-- числовой Apple ID приложения (0 = взять встроенный BUILD_NUMBER)
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: false
    scripts:
      - name: Generate Xcode project (XcodeGen)
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen generate
          xcodebuild -project "$XCODE_PROJECT" -list
      - name: Fetch signing files & apply profiles
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          xcode-project use-profiles
      - name: Determine build number
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "${APP_STORE_APPLE_ID}" != "0" ] && [ -n "${APP_STORE_APPLE_ID}" ]; then
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" --platform IOS 2>/dev/null || echo 0)
            NEW_BUILD_NUMBER=$(( LATEST + 1 ))
          else
            NEW_BUILD_NUMBER="$BUILD_NUMBER"
          fi
          echo "NEW_BUILD_NUMBER=$NEW_BUILD_NUMBER" >> "$CM_ENV"
          echo "Build number for this run: $NEW_BUILD_NUMBER"
      - name: Build signed IPA for App Store
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO CURRENT_PROJECT_VERSION=$NEW_BUILD_NUMBER"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: true   # включи, когда будешь готов автоматически подавать на ревью
